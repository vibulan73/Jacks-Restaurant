spring.application.name=jacks_backend
server.port=8080

# ─── Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jacksnorwood}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:4321}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:JacksNorwoodSuperSecretKeyForJWTTokenGeneration2024MustBe256Bits1234}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── CORS ───────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ─── Mail ───────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── File Upload ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Logging ────────────────────────────────────────────────
logging.level.com.jacksnorwood=DEBUG
